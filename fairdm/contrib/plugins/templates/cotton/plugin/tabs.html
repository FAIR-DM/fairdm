{% load static i18n plugin_tags %}

<c-vars for active_tab="" />
{% get_plugin_tabs obj=for as tabs %}
<c-mvp-toolbar class="container-fluid bg-body">
  <c-slot name="start">
    <c-nav type="underline">
      {% for tab in tabs %}
        <c-nav.item text="{{ tab.label }}"
                    href="{{ tab.url|default:'#' }}"
                    :active="tab.is_active"
                    icon="{{ tab.icon }}" />
      {% endfor %}
    </c-nav>
  </c-slot>
</c-mvp-toolbar>
