<c-card.simple>
  <div class="d-flex flex-column flex-sm-row align-items-center align-items-sm-start gap-4">
    <c-avatar src="{{ object.get_photo_url }}"
              alt="{{ user }}"
              size="xxl" />
    <div>
      <h4 class="mb-1">{{ object }}</h4>
      <p class="text-secondary mb-2">Senior Researcher · University of Example</p>
      <p class="mb-0 small">Member since {{ object.added|date:"Y" }}. Sedimentary geochemistry and isotope analysis.</p>
    </div>
  </c-card.simple>
